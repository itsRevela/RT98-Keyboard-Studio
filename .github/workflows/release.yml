name: Release (Windows EXE)

# Manual only: run from the Actions tab via "Run workflow".
on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v0.1.0)"
        required: true
      title:
        description: "Release title"
        required: true
      notes:
        description: "Release description / notes (Markdown)"
        required: false
        default: ""
      prerelease:
        description: "Mark as a pre-release"
        type: boolean
        default: false

permissions:
  contents: write   # create the release + tag

jobs:
  windows-exe:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Fetch bundled runtimes (Node + ffmpeg)
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force packaging/bin | Out-Null
          $node = "v20.18.0"   # bump as needed
          Invoke-WebRequest "https://nodejs.org/dist/$node/win-x64/node.exe" -OutFile packaging/bin/node.exe
          Invoke-WebRequest "https://www.gyan.dev/ffmpeg/builds/ffmpeg-release-essentials.zip" -OutFile ffmpeg.zip
          Expand-Archive ffmpeg.zip -DestinationPath ffmpeg_extract -Force
          $ff = Get-ChildItem -Recurse ffmpeg_extract -Filter ffmpeg.exe | Select-Object -First 1
          Copy-Item $ff.FullName packaging/bin/ffmpeg.exe
          Get-ChildItem packaging/bin

      - name: Build exe (PyInstaller)
        run: pyinstaller --noconfirm rt98studio.spec

      - name: Import GPG key
        shell: bash
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
        run: |
          if [ -z "$GPG_PRIVATE_KEY" ]; then
            echo "::error::GPG_PRIVATE_KEY secret is not set"; exit 1
          fi
          # Use gpg's default home; a custom GNUPGHOME from $RUNNER_TEMP gets
          # mangled by Git-bash on Windows and yields "no writable keyring".
          echo "$GPG_PRIVATE_KEY" | gpg --batch --import
          KEYID=$(gpg --list-secret-keys --with-colons | awk -F: '/^sec/{print $5; exit}')
          echo "GPG_KEYID=$KEYID" >> "$GITHUB_ENV"
          gpg --list-secret-keys --keyid-format=long

      - name: Sign the exe
        shell: bash
        env:
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          gpg --batch --yes --pinentry-mode loopback --passphrase "$GPG_PASSPHRASE" \
              --armor --detach-sign --output dist/RT98Studio.exe.asc dist/RT98Studio.exe
          gpg --verify dist/RT98Studio.exe.asc dist/RT98Studio.exe
          sha256sum dist/RT98Studio.exe | tee dist/RT98Studio.exe.sha256

      - name: Tag, sign, and publish release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
          TAG: ${{ inputs.tag }}
          TITLE: ${{ inputs.title }}
          NOTES: ${{ inputs.notes }}
          PRERELEASE: ${{ inputs.prerelease }}
        run: |
          printf '%s' "$NOTES" > notes.md
          # Loopback wrapper so git can sign the tag non-interactively in CI.
          WRAP="$HOME/gpg-loopback.sh"
          printf '#!/usr/bin/env bash\nexec gpg --batch --pinentry-mode loopback --passphrase "$GPG_PASSPHRASE" "$@"\n' > "$WRAP"
          chmod +x "$WRAP"
          git config user.name "Revela (releases)"
          git config user.email "rexmarek@gmail.com"
          git config user.signingkey "$GPG_KEYID"
          git config gpg.program "$WRAP"
          # GPG-signed annotated tag so the release tag shows "Verified" too;
          # fall back to an unsigned tag rather than failing the whole release.
          if ! git tag -s "$TAG" -m "$TITLE"; then
            echo "::warning::signed tag failed; creating an unsigned tag instead"
            git -c gpg.program=gpg tag -a "$TAG" -m "$TITLE"
          fi
          git push origin "refs/tags/$TAG"
          PRE=""
          if [ "$PRERELEASE" = "true" ]; then PRE="--prerelease"; fi
          gh release create "$TAG" \
            --title "$TITLE" \
            --notes-file notes.md \
            $PRE \
            dist/RT98Studio.exe \
            dist/RT98Studio.exe.asc \
            dist/RT98Studio.exe.sha256
